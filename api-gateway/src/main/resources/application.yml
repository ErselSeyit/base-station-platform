spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: base-station-service
          uri: lb://base-station-service
          predicates:
            - Path=/api/v1/stations/**
          filters:
            - StripPrefix=0
        - id: monitoring-service
          uri: lb://monitoring-service
          predicates:
            - Path=/api/v1/metrics/**
          filters:
            - StripPrefix=0
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=0

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

