spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: base-station-service
          uri: lb://base-station-service
          predicates:
            - Path=/api/v1/stations/**
          filters:
            - StripPrefix=0
        - id: monitoring-service
          uri: lb://monitoring-service
          predicates:
            - Path=/api/v1/metrics/**
          filters:
            - StripPrefix=0
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=0

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}

spring:
  data:
    redis:
      reactive:
        host: ${SPRING_DATA_REDIS_HOST:localhost}
        port: ${SPRING_DATA_REDIS_PORT:6379}
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
            - name: CircuitBreaker
              args:
                name: authServiceCircuitBreaker
                fallbackUri: forward:/fallback/auth

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

