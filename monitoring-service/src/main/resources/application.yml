spring:
  application:
    name: monitoring-service
  data:
    mongodb:
      host: localhost
      port: 27017
      database: monitoringdb

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.huawei.monitoring: DEBUG

