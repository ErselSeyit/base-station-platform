apiVersion: apps/v1
kind: Deployment
metadata:
  name: base-station-service
  namespace: basestation-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: base-station-service
  template:
    metadata:
      labels:
        app: base-station-service
    spec:
      containers:
      - name: base-station-service
        image: base-station-service:latest
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://postgres-basestation:5432/basestationdb
        - name: SPRING_DATASOURCE_USERNAME
          value: postgres
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: password
        - name: SPRING_DATA_REDIS_HOST
          value: redis
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: http://eureka-server:8761/eureka/
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: base-station-service
  namespace: basestation-platform
spec:
  selector:
    app: base-station-service
  ports:
  - port: 8081
    targetPort: 8081

