apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-basestation-pvc
  namespace: basestation-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-basestation
  namespace: basestation-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-basestation
  template:
    metadata:
      labels:
        app: postgres-basestation
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_DB
          value: basestationdb
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: password
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-basestation-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-basestation
  namespace: basestation-platform
spec:
  selector:
    app: postgres-basestation
  ports:
  - port: 5432
    targetPort: 5432

